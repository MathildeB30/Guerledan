---

    # Normalisation des données en TS, SV ou données brutes (puissance reçue)
    q_normalize: "TS" # "SV"  # "TS", "SV" ou null

    # Visualisation des données
    q_visu: True  # true ou false

    # Lecture des angles d'arrivées des échos: true ou false
    q_angle: True
    

    # Palette de couleur pour la visualisation de l'amplitude
    # (si visualisation)
    colormap: "simrad" # Une des couleurs de Matplotlib ou "simrad"

    # Valeurs des bornes de la colorbar si visualisation
